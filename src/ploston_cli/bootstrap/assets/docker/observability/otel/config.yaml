# =============================================================================
# OpenTelemetry Collector Configuration for Ploston Docker Compose
# =============================================================================
# Receives telemetry from Ploston and routes to:
# - Metrics -> Prometheus
# - Logs    -> ClickHouse (via OTEL ClickHouse exporter)
# - Traces  -> ClickHouse (via OTEL ClickHouse exporter)
# Replaces Loki + Tempo per DEC-191 / M-082.
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # KEEP - defensive against memory pressure
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75
    spike_limit_percentage: 25

  # KEEP - sets service.namespace and environment for multi-env deployments
  resource:
    attributes:
      - key: service.namespace
        value: ploston
        action: upsert
      - key: environment
        value: docker-compose
        action: upsert

  # KEEP - batching for throughput
  batch:
    timeout: 5s
    send_batch_size: 1000

  # REMOVED: attributes/loki_hints - was promoting high-cardinality ael_*
  #          attributes to Loki stream labels (DEC-154 mistake; DEC-191 fix).
  # REMOVED: resource/loki_hints  - same reason.

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: ploston
    const_labels:
      environment: docker-compose
    resource_to_telemetry_conversion:
      enabled: true

  # ClickHouse exporter creates `otel_logs` and `otel_traces` tables on first
  # write using its built-in schema (v0.105.0). DO NOT set logs_table_name or
  # traces_table_name; the S-295 schema layers VIEWs (`ploston.events`,
  # `ploston.traces`) on top of the exporter-owned tables.
  clickhouse:
    endpoint: tcp://clickhouse:9000
    database: ploston
    # No username/password: ClickHouse default user is passwordless.
    # The clickhouse exporter at v0.105.0 transmits a non-empty native-protocol
    # auth packet when given an explicit empty password, which ClickHouse
    # rejects with code: 516. Omit the keys entirely (T-975 / S-303).
    timeout: 10s
    sending_queue:
      enabled: true
      queue_size: 5000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  debug:
    verbosity: basic

  # =========================================================================
  # ENTERPRISE LOG EXPORT STUBS (F-068 / DEC-156)
  # Activate by uncommenting the appropriate exporter and adding its name
  # to the logs pipeline exporters list alongside 'clickhouse'.
  #
  # SECURITY: Only Ploston-generated structured events are exported.
  # MCP server process logs stay local on the runner machine and are
  # never included in any export pipeline.
  # =========================================================================

  # Generic OTLP forward - works with any OTLP-compatible backend
  # otlp/enterprise:
  #   endpoint: "https://your-collector.corp.com:4317"
  #   tls:
  #     insecure: false
  #   headers:
  #     Authorization: "Bearer ${ENTERPRISE_OTLP_TOKEN}"

  # Elasticsearch / OpenSearch direct exporter
  # elasticsearch:
  #   endpoints: ["https://elasticsearch.corp.com:9200"]
  #   index: "ploston-logs"
  #   api_key: "${ELASTICSEARCH_API_KEY}"

  # Splunk HEC
  # splunk_hec/logs:
  #   endpoint: "https://splunk.corp.com:8088/services/collector/event"
  #   token: "${SPLUNK_HEC_TOKEN}"
  #   source: "ploston"
  #   sourcetype: "ploston:execution"

  # Datadog
  # datadog:
  #   api:
  #     key: "${DD_API_KEY}"

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [clickhouse]
      # Enterprise: add your exporter here, e.g.: exporters: [clickhouse, otlp/enterprise]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [clickhouse]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
