# =============================================================================
# OpenTelemetry Collector Configuration for Ploston Docker Compose
# =============================================================================
# Receives telemetry from Ploston and routes to:
# - Metrics -> Prometheus
# - Logs -> Loki
# - Traces -> Tempo
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100
  resource:
    attributes:
      - key: environment
        value: docker-compose
        action: upsert
      - key: service.namespace
        value: ploston
        action: upsert

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: ploston
    const_labels:
      environment: docker-compose
    resource_to_telemetry_conversion:
      enabled: true
  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"
    default_labels_enabled:
      exporter: true
      job: true
    labels:
      resource:
        - service.name
      attributes:
        - execution_id
        - workflow_id
        - step_id
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [loki]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/tempo]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
