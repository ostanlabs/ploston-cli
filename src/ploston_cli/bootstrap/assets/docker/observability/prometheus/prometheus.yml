# =============================================================================
# Prometheus Configuration for Ploston Docker Compose
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: docker-compose
    service: ploston

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Ploston Control Plane metrics
  - job_name: 'ploston'
    static_configs:
      - targets: ['ploston:8022']
    metrics_path: /metrics
    scrape_interval: 10s

  # Native Tools metrics (dependency health, tools available)
  - job_name: 'native-tools'
    static_configs:
      - targets: ['native-tools:8081']
    metrics_path: /metrics
    scrape_interval: 10s

  # OTEL Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
