# =============================================================================
# Ploston Observability Stack - Docker Compose Overlay
# =============================================================================
# Provides full observability:
# - Prometheus:    Metrics collection
# - Grafana:       Visualization and dashboards
# - ClickHouse:    Logs + traces storage (replaces Loki + Tempo per DEC-191)
# - OTEL Collector: Telemetry routing
#
# Usage: docker compose -f docker-compose.yaml -f observability/docker-compose.observability.yaml up
# Volume paths are relative to the project directory (~/.ploston/), not this file.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ploston-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Grafana - Visualization
  # ---------------------------------------------------------------------------
  # Plugin install: ClickHouse datasource plugin is fetched at startup via
  # GF_INSTALL_PLUGINS. For air-gapped operation, drop a tarball into
  # ./observability/grafana/plugins/ and uncomment the GF_PATHS_PLUGINS line
  # below. See documentation/engineering/specs/s297-otel-collector-clickhouse.md
  # 'Plugin install — air-gapped-friendly'.
  grafana:
    image: grafana/grafana:10.2.3
    container_name: ploston-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ploston
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      # Air-gapped path (uncomment + populate plugins/ dir):
      # - GF_PATHS_PLUGINS=/var/lib/grafana/plugins
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # - ./observability/grafana/plugins:/var/lib/grafana/plugins:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      prometheus:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # ClickHouse - Logs + Traces Storage
  # ---------------------------------------------------------------------------
  # Schema is created by the migration runner from S-295 at CP startup; the
  # init scripts under observability/clickhouse/init/ run only on first volume
  # init and seed the database in case CP-driven migrations are skipped.
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: ploston-clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native protocol
    environment:
      CLICKHOUSE_DB: ploston
      # OSS demo: passwordless ``default`` user for simpler bootstrap. Premium
      # can layer access management on top later. The users.d/ override below
      # drops the image-bundled localhost-only network restriction so CP and
      # the OTEL collector can connect over the docker network.
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./observability/clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ./observability/clickhouse/users.d:/etc/clickhouse-server/users.d:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # OTEL Collector - Telemetry Routing
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    container_name: ploston-otel
    command: --config=/etc/otel/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC (Tempo no longer claims this port)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
    volumes:
      - ./observability/otel/config.yaml:/etc/otel/config.yaml:ro
    # Note: otel-contrib image is scratch-based (no wget/curl/sh).
    # Nothing depends on otel-collector health; disable Docker healthcheck.
    healthcheck:
      disable: true
    depends_on:
      prometheus:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

volumes:
  prometheus-data:
  grafana-data:
  clickhouse-data:
