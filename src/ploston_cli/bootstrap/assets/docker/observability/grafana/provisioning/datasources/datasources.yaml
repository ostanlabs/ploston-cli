# =============================================================================
# Grafana Datasources for Ploston Docker Compose
# =============================================================================
# Replaces Loki + Tempo with the ClickHouse datasource per DEC-191 / M-082.
# Dashboards reference the literal uid `clickhouse`.
# =============================================================================
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true

  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse
    access: proxy
    editable: false
    jsonData:
      server: clickhouse
      port: 9000
      username: default
      defaultDatabase: ploston
      protocol: native
      tlsSkipVerify: true
