# =============================================================================
# ClickHouse for Ploston Homelab (replaces Loki + Tempo per DEC-191)
# =============================================================================
# OTEL exporter writes otel_logs / otel_traces to the `ploston` database.
# Owned tables (executions, steps, tool_calls) and SQL VIEWs (events, traces)
# are created by the S-295 migration runner triggered from CP startup.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: observability
  labels:
    app: clickhouse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8-alpine
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: ploston
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "200m"
            limits:
              memory: "4Gi"
              cpu: "2"
          readinessProbe:
            exec:
              command: ["clickhouse-client", "--query", "SELECT 1"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["clickhouse-client", "--query", "SELECT 1"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: clickhouse-data
        - name: init
          configMap:
            name: clickhouse-init
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: observability
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data
  namespace: observability
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init
  namespace: observability
data:
  01-create-database.sql: |
    -- See assets/docker/observability/clickhouse/init/01-create-database.sql
    -- Schema migration runs from CP startup (S-295 / T-940).
    CREATE DATABASE IF NOT EXISTS ploston;
