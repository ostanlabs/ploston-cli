# =============================================================================
# OpenTelemetry Collector for Ploston Homelab
# =============================================================================
# Receives telemetry from Ploston and routes to:
# - Metrics -> Prometheus
# - Logs -> Loki
# - Traces -> Tempo
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      resource:
        attributes:
          - key: environment
            value: homelab
            action: upsert
          - key: service.namespace
            value: ploston
            action: upsert
      # Hint processors for Loki label promotion.
      # The loki exporter reads these hint attributes to decide which
      # resource/log attributes to promote to Loki index labels.
      resource/loki_hints:
        attributes:
          - key: loki.resource.labels
            value: service.name, service.namespace
            action: upsert
      attributes/loki_hints:
        actions:
          - key: loki.attribute.labels
            value: ael_execution_id, ael_workflow_id, ael_step_id, ael_source, ael_bridge, ael_tool_name, ael_runner_id
            action: insert

    exporters:
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: ploston
        const_labels:
          environment: homelab
        resource_to_telemetry_conversion:
          enabled: true
      loki:
        endpoint: "http://loki.observability.svc:3100/loki/api/v1/push"
        default_labels_enabled:
          exporter: true
          job: true
      otlp/tempo:
        endpoint: "tempo.observability.svc:4317"
        tls:
          insecure: true
      debug:
        verbosity: basic

      # =========================================================================
      # ENTERPRISE LOG EXPORT STUBS (F-068 / DEC-156)
      # Activate by uncommenting the appropriate exporter and adding its name
      # to the logs pipeline exporters list alongside 'loki'.
      #
      # SECURITY: Only Ploston-generated structured events are exported.
      # MCP server process logs stay local on the runner machine and are
      # never included in any export pipeline.
      # =========================================================================

      # Generic OTLP forward — works with any OTLP-compatible backend
      # otlp/enterprise:
      #   endpoint: "https://your-collector.corp.com:4317"
      #   tls:
      #     insecure: false
      #   headers:
      #     Authorization: "Bearer ${ENTERPRISE_OTLP_TOKEN}"

      # Elasticsearch / OpenSearch direct exporter
      # elasticsearch:
      #   endpoints: ["https://elasticsearch.corp.com:9200"]
      #   index: "ploston-logs"
      #   api_key: "${ELASTICSEARCH_API_KEY}"

      # Splunk HEC
      # splunk_hec/logs:
      #   endpoint: "https://splunk.corp.com:8088/services/collector/event"
      #   token: "${SPLUNK_HEC_TOKEN}"
      #   source: "ploston"
      #   sourcetype: "ploston:execution"

      # Datadog
      # datadog:
      #   api:
      #     key: "${DD_API_KEY}"

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource, resource/loki_hints, attributes/loki_hints]
          exporters: [loki]
          # Enterprise: add your exporter here, e.g.: exporters: [loki, otlp/enterprise]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [otlp/tempo]
      telemetry:
        logs:
          level: info
        metrics:
          address: 0.0.0.0:8888
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.92.0
          args:
            - --config=/etc/otel/config.yaml
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 8889
              name: prometheus
            - containerPort: 13133
              name: health
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prometheus
      port: 8889
      targetPort: 8889
